name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build React app
        run: npm run build
        working-directory: app

      - name: Assemble deployment directory
        run: |
          mkdir -p deploy/app
          # Static files at the root (landing page, old app, story)
          cp index.html deploy/
          # second-brain.html removed — React app is the only version
          cp story.html deploy/ 2>/dev/null || true
          # React app goes into /app subdirectory
          cp -r app/dist/. deploy/app/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
