<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #EEEAE3;
      --hdr:      56px;
      --col-w:    264px;
      --gap:      10px;
      --r:        12px;
      --margi:    #E07A5F;
      --samarth:  #3D8B8F;
      --dark:     #2D2535;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      color: #1F2937;
    }

    /* ─── LOGIN SCREEN ──────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .login-card {
      background: white;
      border-radius: 24px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      max-width: 340px;
      width: 100%;
    }
    .login-logo { font-size: 42px; margin-bottom: 12px; }
    .login-title { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: #9CA3AF; margin-bottom: 28px; }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 20px;
      border-radius: 50px;
      border: 1px solid #E5E7EB;
      background: white;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .google-btn:hover { background: #F9FAFB; box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
    .login-error { font-size: 12px; color: #DC2626; margin-top: 14px; min-height: 18px; }

    /* ─── HEADER ─────────────────────────────────── */
    header {
      height: var(--hdr);
      background: white;
      border-bottom: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      position: relative;
      z-index: 10;
    }

    .logo { font-size: 15px; font-weight: 700; color: var(--dark); display: flex; align-items: center; gap: 8px; }
    .logo-sub { font-size: 11px; font-weight: 400; color: #9CA3AF; letter-spacing: 0.03em; }

    .hdr-right { display: flex; align-items: center; gap: 8px; }

    .partner-toggle {
      display: flex;
      background: #F3F4F6;
      border-radius: 50px;
      padding: 3px;
      gap: 2px;
    }
    .ptn-btn {
      padding: 4px 13px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #9CA3AF;
      transition: all 0.15s;
    }
    .ptn-btn.m-on { background: white; color: #b85a43; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .ptn-btn.s-on { background: white; color: #2e6b6e; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .ghost-btn {
      padding: 5px 13px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #E5E7EB;
      background: white;
      color: #6B7280;
      transition: all 0.12s;
    }
    .ghost-btn:hover { background: #F9FAFB; }

    /* ─── BOARD ──────────────────────────────────── */
    .board {
      display: flex;
      gap: var(--gap);
      padding: 14px 16px;
      height: calc(100vh - var(--hdr));
      overflow-x: auto;
      overflow-y: hidden;
      align-items: flex-start;
      -webkit-overflow-scrolling: touch;
    }
    .board::-webkit-scrollbar { height: 5px; }
    .board::-webkit-scrollbar-thumb { background: #C9C5BE; border-radius: 4px; }

    /* ─── COLUMN ─────────────────────────────────── */
    .col {
      min-width: var(--col-w);
      width: var(--col-w);
      max-height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: var(--r);
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.06);
      overflow: hidden;
      flex-shrink: 0;
    }

    .col-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px 9px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .col-emoji { font-size: 14px; }
    .col-label { font-size: 12px; font-weight: 600; flex: 1; }
    .col-count {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 50px;
      background: rgba(0,0,0,0.08);
    }
    .col-plus {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      background: rgba(0,0,0,0.07);
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .col-plus:hover { background: rgba(0,0,0,0.14); }

    /* Column tints */
    [data-cat="task"]       .col-head { background: #EFF6FF; color: #1D4ED8; }
    [data-cat="worry"]      .col-head { background: #FFFBEB; color: #B45309; }
    [data-cat="idea"]       .col-head { background: #F5F3FF; color: #6D28D9; }
    [data-cat="purchase"]   .col-head { background: #F0FDF4; color: #166534; }
    [data-cat="trip"]       .col-head { background: #F0F9FF; color: #0369A1; }
    [data-cat="life-admin"] .col-head { background: #F1F5F9; color: #475569; }
    [data-cat="other"]      .col-head { background: #F9FAFB; color: #6B7280; }

    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    .col-body.over { background: rgba(99,102,241,0.06); border-radius: 0 0 var(--r) var(--r); }

    .col-empty {
      text-align: center;
      padding: 24px 8px;
      font-size: 11px;
      color: #CBD5E1;
      line-height: 1.6;
    }

    /* ─── CARD ───────────────────────────────────── */
    .card {
      background: white;
      border-radius: 9px;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      cursor: grab;
      transition: transform 0.14s, box-shadow 0.14s;
      user-select: none;
    }
    .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.10); transform: translateY(-1px); }
    .card:active { cursor: grabbing; }
    .card.dragging { opacity: 0.38; transform: rotate(2deg) scale(1.02); }
    .card.acked { opacity: 0.48; }

    .card-row1 { display: flex; gap: 8px; margin-bottom: 8px; }
    .card-av {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .card-text {
      font-size: 12.5px;
      color: #374151;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-row2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-time { font-size: 10px; color: #D1D5DB; }
    .card-acts { display: flex; gap: 3px; opacity: 0; transition: opacity 0.12s; }
    .card:hover .card-acts { opacity: 1; }
    .card-btn {
      font-size: 10.5px;
      padding: 2px 7px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      background: transparent;
      transition: all 0.1s;
    }
    .card-btn.ack  { color: #9CA3AF; } .card-btn.ack:hover  { background: #F0FDF4; color: #166534; }
    .card-btn.del  { color: #E5E7EB; } .card-btn.del:hover  { background: #FEF2F2; color: #DC2626; }
    .seen-dot { font-size: 9px; color: #6EE7B7; }

    @keyframes cardIn { from { opacity:0; transform:scale(0.93) translateY(5px); } to { opacity:1; transform:none; } }
    .card-new { animation: cardIn 0.2s ease-out; }

    /* ─── TAB BAR (mobile only) ─────────────────────── */
    .tab-bar {
      display: none;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid #E5E7EB;
      padding: 0 8px;
      gap: 2px;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 10px 12px;
      border: none;
      background: transparent;
      font-size: 13px;
      color: #9CA3AF;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .tab-btn.active { color: var(--dark); border-bottom-color: var(--dark); font-weight: 600; }

    /* ─── MOBILE ─────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 14px; }
      .logo-sub { display: none; }
      .ghost-btn.digest-btn { display: none; }

      .tab-bar { display: flex; }

      .board {
        flex-direction: column;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 10px 12px;
        height: calc(100vh - var(--hdr) - 45px);
        align-items: stretch;
        gap: 0;
      }
      .board::-webkit-scrollbar { display: none; }

      .col {
        display: none;
        min-width: 100%;
        width: 100%;
        max-height: none;
        border-radius: var(--r);
        margin-bottom: 0;
      }
      .col.mobile-active {
        display: flex;
      }
      .col-body {
        max-height: 60vh;
      }
      .col-plus { width: 28px; height: 28px; font-size: 16px; }

      .chat {
        width: calc(100vw - 24px);
        right: 12px;
        left: 12px;
        bottom: 80px;
        height: 68vh;
        border-radius: 18px;
      }
      .fab { bottom: 16px; right: 16px; }
    }

    /* ─── CHAT FAB ───────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 22px; right: 22px;
      z-index: 100;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--dark);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(0,0,0,0.28); }
    .fab.open  { background: #6B7280; transform: rotate(0deg); }

    /* ─── CHAT PANEL ─────────────────────────────── */
    .chat {
      position: fixed;
      bottom: 84px; right: 22px;
      z-index: 99;
      width: 330px;
      height: 470px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.16);
      display: flex;
      flex-direction: column;
      transform: scale(0.88) translateY(24px);
      opacity: 0;
      pointer-events: none;
      transform-origin: bottom right;
      transition: all 0.24s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }
    .chat.on {
      transform: none;
      opacity: 1;
      pointer-events: all;
    }

    .chat-hdr {
      padding: 13px 15px 11px;
      border-bottom: 1px solid #F3F4F6;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-av {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6B4E71, #3D8B8F);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .chat-name { font-size: 13px; font-weight: 600; color: #1F2937; }
    .chat-hint { font-size: 10.5px; color: #9CA3AF; margin-top: 1px; }

    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .chat-msgs::-webkit-scrollbar { width: 3px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }

    .msg { display: flex; gap: 6px; max-width: 92%; }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 8px 11px;
      border-radius: 14px;
      font-size: 12.5px;
      line-height: 1.45;
    }
    .msg.bot  .bubble { background: #F3F4F6; color: #374151; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: var(--dark); color: white; border-bottom-right-radius: 4px; }

    .msg-icon {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6B4E71, #3D8B8F);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .qrs { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .qr {
      padding: 3px 9px;
      border-radius: 50px;
      font-size: 11px;
      border: 1px solid #E5E7EB;
      background: white;
      color: #374151;
      cursor: pointer;
      transition: all 0.12s;
    }
    .qr:hover { background: var(--dark); color: white; border-color: var(--dark); }

    @keyframes msgIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
    .msg { animation: msgIn 0.18s ease-out; }

    /* Typing dots */
    .typing {
      display: flex; gap: 4px;
      background: #F3F4F6;
      padding: 10px 14px;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #9CA3AF;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

    .chat-foot {
      padding: 9px 10px;
      border-top: 1px solid #F3F4F6;
      display: flex;
      align-items: flex-end;
      gap: 7px;
      flex-shrink: 0;
    }
    .chat-ta {
      flex: 1;
      resize: none;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12.5px;
      font-family: inherit;
      color: #374151;
      outline: none;
      min-height: 36px;
      max-height: 90px;
      line-height: 1.4;
      transition: border-color 0.14s;
    }
    .chat-ta:focus { border-color: #6B4E71; }
    .chat-send {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--dark);
      color: white;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      transition: all 0.14s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-send:hover { background: #4A3D55; transform: scale(1.06); }

    /* ─── OVERLAY ────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      z-index: 200;
      backdrop-filter: blur(3px);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.on { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 26px;
      max-width: 500px;
      width: 100%;
      max-height: 78vh;
      overflow-y: auto;
    }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      font-size: 20px; color: #9CA3AF;
      background: none; border: none; cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>

<!-- ─── LOGIN SCREEN ─────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🧠</div>
    <div class="login-title">Second Brain</div>
    <div class="login-sub">Sign in to access your shared board</div>
    <button class="google-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ─── HEADER ──────────────────────────────────────── -->
<header>
  <div class="logo">
    🧠 Second Brain
    <span class="logo-sub">shared · private</span>
  </div>
  <div class="hdr-right">
    <div class="partner-toggle">
      <button id="btn-m" class="ptn-btn" onclick="setPartner('Margi')">Margi</button>
      <button id="btn-s" class="ptn-btn" onclick="setPartner('Samarth')">Samarth</button>
    </div>
    <button class="ghost-btn digest-btn" onclick="openDigest()">🗓 Weekly Digest</button>
    <button class="ghost-btn" onclick="signOut()" id="signout-btn" style="display:none">Sign out</button>
  </div>
</header>

<!-- ─── TAB BAR (mobile) ──────────────────────────────── -->
<div class="tab-bar" id="tab-bar"></div>

<!-- ─── KANBAN BOARD ─────────────────────────────────── -->
<div class="board" id="board"></div>

<!-- ─── CHAT FAB ─────────────────────────────────────── -->
<button class="fab" id="fab" onclick="toggleChat()">💬</button>

<!-- ─── CHAT PANEL ────────────────────────────────────── -->
<div class="chat" id="chat">
  <div class="chat-hdr">
    <div class="chat-av">🧠</div>
    <div>
      <div class="chat-name">Second Brain</div>
      <div class="chat-hint" id="chat-hint">Tell me anything — I'll sort it</div>
    </div>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-foot">
    <textarea class="chat-ta" id="chat-ta" rows="1"
      placeholder="What's on your mind?"
      onkeydown="chatKey(event)"
      oninput="grow(this)"></textarea>
    <button class="chat-send" onclick="send()">↑</button>
  </div>
</div>

<!-- ─── DIGEST OVERLAY ────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <span class="modal-title">🗓 Weekly Digest</span>
      <button class="modal-close" onclick="closeOverlay()">×</button>
    </div>
    <div id="digest-body"></div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────────────────
//  FIREBASE INIT
// ────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCkTkvEYXKYJjVqMcoijVF7aa6gszi6WXg",
  authDomain: "second-brain-1619f.firebaseapp.com",
  databaseURL: "https://second-brain-1619f-default-rtdb.firebaseio.com",
  projectId: "second-brain-1619f",
  storageBucket: "second-brain-1619f.firebasestorage.app",
  messagingSenderId: "192541189972",
  appId: "1:192541189972:web:3b216087a61b5bf6a90ac1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const entriesRef = db.ref('entries');

// ────────────────────────────────────────────────────────────
//  AUTH
// ────────────────────────────────────────────────────────────
const ALLOWED = ['margihdesai@gmail.com', 'samarthjmodi@gmail.com'];

function signIn() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).catch(err => {
      document.getElementById('login-error').textContent = err.code + ': ' + err.message;
    });

function meta(id)  { return CATS.find(c => c.id === id) || OTHER; }
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function esc(t) {
  return String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function ago(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const m  = Math.floor(ms / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  const d = Math.floor(h / 24);
  if (d === 1) return 'yesterday';
  if (d < 7)   return d + 'd';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function scoreCats(text) {
  const lo = text.toLowerCase();
  return CATS
    .map(c => ({ cat: c, score: c.keys.filter(k => lo.includes(k)).length }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);
}

function detectCat(text) {
  return scoreCats(text)[0]?.cat.id || 'other';
}

function addEntry(text, cat) {
  const e = { id: Date.now().toString(), text: text.trim(), author: partner,
              category: cat, ts: new Date().toISOString(), acked: false, ackedBy: null };
  entries.unshift(e);
  saveEntries();
  return e;
}

function ackEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e || e.author === partner) return;
  e.acked = !e.acked;
  e.ackedBy = e.acked ? partner : null;
  saveEntries();
}

function delEntry(id) {
  entries = entries.filter(x => x.id !== id);
  saveEntries();
}

let dragId = null;

function dragStart(ev, id) {
  dragId = id;
  ev.currentTarget.classList.add('dragging');
  ev.dataTransfer.effectAllowed = 'move';
}
function dragEnd(ev) {
  ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('over'));
}
function dragOver(ev) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.col-body').forEach(b => b.classList.remove('over'));
  ev.currentTarget.classList.add('over');
}
function drop(ev, cat) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('over');
  if (!dragId) return;
  const e = entries.find(x => x.id === dragId);
  if (e && e.category !== cat) { e.category = cat; saveEntries(); renderBoard(); }
  dragId = null;
}

function resetChat() {
  document.getElementById('chat-msgs').innerHTML = '';

  state   = 'ready';

function chatKey(ev) {
  if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); send(); }
}

function grow(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 90) + 'px';
}

function send() {
  const ta   = document.getElementById('chat-ta');
  const text = ta.value.trim();
  if (!text) return;
  addUser(text);
  ta.value = ''; ta.style.height = 'auto';
  state === 'await_cat' ? handleCatReply(text) : processMsg(text);
}

function processMsg(text) {
  const lo = text.toLowerCase();

  // Greetings
  if (/^(hi|hey|hello|yo|sup|hiya)\b/.test(lo)) {
    typing(() => addBot("Hey! 👋 What's on your mind?"));
    return;
  }
  // Thanks
  if (/\b(thank you|thanks|thx|ty)\b/.test(lo)) {
    typing(() => addBot("Happy to help 🧠 Anything else?"));
    return;
  }
  // Undo
  if (/\b(undo|delete that|remove that|never mind|nevermind|scratch that)\b/.test(lo)) {
    const last = entries.find(e => e.author === partner);
    if (last) {
      const preview = last.text.slice(0, 40) + (last.text.length > 40 ? '…' : '');
      delEntry(last.id);
      typing(() => addBot(`Removed "${preview}" 🗑`));
    } else {
      typing(() => addBot("Nothing recent to undo!"));
    }
    return;
  }
  // Summary
  if (/\b(summary|overview|show (me )?everything|show all|what('?s| is) on (the )?board)\b/.test(lo)) {
    showSummary();
    return;
  }
  // Count
  if (/\b(how many|count|total)\b/.test(lo)) {
    const unseen = entries.filter(e => !e.acked && e.author !== partner).length;
    typing(() => addBot(`${entries.length} items on the board total. ${unseen} new for you.`));
    return;
  }
  // Show by author
  if (/\b(what did (samarth|margi) (add|post|say)|show (samarth|margi)'?s)\b/.test(lo)) {
    const name = lo.match(/samarth|margi/)?.[0];
    showByAuthor(name.charAt(0).toUpperCase() + name.slice(1));
    return;
  }
  // Show category
  if (/\b(show|list|what).*(task|worr|idea|purchase|trip|admin)\b/.test(lo)) {
    const w = lo.match(/task|worr|idea|purchase|trip|admin/)?.[0];
    showList(w === 'admin' ? 'life-admin' : w.startsWith('worr') ? 'worry' : w);
    return;
  }

  // Column hint — skip detection
  if (hintCat) {
    const cat = hintCat;
    hintCat   = null;
    document.getElementById('chat-hint').textContent = 'Tell me anything — I\'ll sort it';
    typing(() => { addEntry(text, cat); addBot(botReply(cat)); });
    return;
  }

  // Score-based categorization
  const scored = scoreCats(text);
  if (scored.length >= 2 && scored[0].score === scored[1].score) {
    pending = text;
    state   = 'await_cat';
    typing(() => addBot(
      `I could file this as a ${scored[0].cat.e} ${scored[0].cat.l.slice(0,-1)} or a ${scored[1].cat.e} ${scored[1].cat.l.slice(0,-1)}. Which fits better?`,
      scored.slice(0, 3).map(h => ({ label: h.cat.e + ' ' + h.cat.l.slice(0,-1), val: h.cat.id }))
    ));
    return;
  }

  const cat = scored[0]?.cat.id || 'other';
  typing(() => { addEntry(text, cat); addBot(botReply(cat)); });
}

function handleCatReply(reply) {
  state = 'ready';
  const lo = reply.toLowerCase();
  let cat = null;
  for (const c of CATS) {
    if (lo.includes(c.id) || lo.includes(c.l.toLowerCase().replace(/s$/, ''))) { cat = c.id; break; }
  }
  if (!cat) cat = detectCat(pending || reply);
  const text = pending || reply;
  pending = null;
  typing(() => { addEntry(text, cat); addBot(botReply(cat)); });
}

function showList(catId) {
  const all  = entries.filter(e => e.category === catId);
  const list = all.slice(0, 4);
  typing(() => {
    if (!list.length) { addBot("Nothing there yet! Add something?"); return; }
    const lines = list.map(e => `• ${e.text.slice(0,55)}${e.text.length>55?'…':''}`).join('\n');
    addBot(lines + (all.length > 4 ? `\n…and ${all.length - 4} more on the board.` : ''));
  });
}

function showSummary() {
  const allCols = [...CATS, OTHER];
  const lines = allCols
    .map(c => ({ c, count: entries.filter(e => e.category === c.id).length }))
    .filter(x => x.count > 0)
    .map(x => `${x.c.e} ${x.c.l}: ${x.count}`);
  typing(() => {
    if (!lines.length) { addBot("The board is empty! Add something first."); return; }
    addBot(lines.join('\n'));
  });
}

function showByAuthor(name) {
  const all  = entries.filter(e => e.author === name);
  const list = all.slice(0, 5);
  typing(() => {
    if (!list.length) { addBot(`${name} hasn't added anything yet!`); return; }
    const lines = list.map(e => `${meta(e.category).e} ${e.text.slice(0,50)}${e.text.length>50?'…':''}`).join('\n');
    addBot(lines + (all.length > 5 ? `\n…and ${all.length - 5} more.` : ''));
  });
}

function addUser(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  append(div);
}

function addBot(text, qrs) {
  const tid = document.getElementById('typing-ind');
  if (tid) tid.remove();
  const div = document.createElement('div');
  div.className = 'msg bot';
  const qrHtml = qrs
    ? `<div class="qrs">${qrs.map(q=>`<button class="qr" onclick="qrClick('${q.val}','${esc(q.label)}')">${q.label}</button>`).join('')}</div>`
    : '';
  div.innerHTML = `<div class="msg-icon">🧠</div><div><div class="bubble">${esc(text)}</div>${qrHtml}</div>`;
  append(div);
}

function typing(cb, delay=680) {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-ind';
  div.innerHTML = `<div class="msg-icon">🧠</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  append(div);
  setTimeout(cb, delay);
}

function qrClick(val, label) {
  addUser(label);
  if (state === 'await_cat') {
    state = 'ready';
    const text = pending || label; pending = null;
    typing(() => { addEntry(text, val); addBot(rand(BOT[val] || BOT.other)); });
  }
}

function append(el) {
  const msgs = document.getElementById('chat-msgs');
  msgs.appendChild(el);
  setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 40);
}

    const allC   = [...CATS, OTHER];

        <div style="margin-bottom:16px;">

          ${byCat[cat.id].map(e=>`
            <div style="display:flex;gap:8px;margin-bottom:5px;font-size:12.5px;color:#4B5563;line-height:1.4;">

            </div>`).join('')}
        </div>`).join('')}
      <div style="border-top:1px solid #F3F4F6;padding-top:14px;display:flex;justify-content:flex-end;">
        <button onclick="if(confirm('Clear all?')){entries=[];saveEntries();renderBoard();closeOverlay();}"
          style="font-size:11px;color:#FCA5A5;background:none;border:none;cursor:pointer;">Clear all entries</button>
      </div>`;
  }
  document.getElementById('overlay').classList.add('on');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('on'); }
function maybeClose(ev) { if (ev.target === document.getElementById('overlay')) closeOverlay(); }

// ────────────────────────────────────────────────────────────
//  INIT
// ────────────────────────────────────────────────────────────
entriesRef.on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    entries = Object.values(data).sort((a, b) => new Date(b.ts) - new Date(a.ts));
  } else {
    entries = seedEntries();
    saveEntries();
  }
  renderBoard();
});
</script>
</body>
